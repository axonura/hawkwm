name: C/C++ CI

on:
  push:
    branches:
      - "main"

  pull_request:
    branches:
      - "main"

jobs:

  #
  # Build Qt Once
  #
  qt-build:
    runs-on: ubuntu-latest

    steps:
    - name: Install Linux Dependencies
      run: |
        sudo apt update

        sudo apt install -y \
          ninja-build \
          build-essential \
          cmake \
          perl \
          python3 \
          zip \
          patchelf \
          libgl-dev \
          libglu1-mesa-dev \
          libx11-xcb-dev \
          libxkbcommon-x11-dev \
          libpcre2-dev \
          zlib1g-dev \
          libfreetype6-dev \
          libpng-dev \
          libjpeg-dev \
          libsqlite3-dev \
          libharfbuzz-dev \
          libb2-dev \
          libdouble-conversion-dev \
          libmd4c-dev \
          libwayland-dev \
          wayland-protocols \
          libxkbcommon-dev \
          libegl1-mesa-dev \
          libgl1-mesa-dev

    - name: Clone Qt Sources
      run: |
        cd ~

        git clone https://github.com/qt/qtbase.git
        git clone https://github.com/qt/qtwayland.git

        cd ~/qtbase
        git checkout 6.10.2

        cd ~/qtwayland
        git checkout 6.10.2

    - name: Build QtBase
      run: |
        cd ~/qtbase

        mkdir build
        cd build

        ../configure \
          -prefix /opt/qt6 \
          -release \
          -opensource \
          -confirm-license \
          -nomake examples \
          -nomake tests \
          -cmake-generator Ninja
          -no-feature-textmarkdownreader

        cmake --build . --parallel

        sudo cmake --install .

    - name: Build QtWayland
      run: |
        cd ~/qtwayland

        mkdir build
        cd build

        /opt/qt6/bin/qt-configure-module .. \
          -cmake-generator Ninja
          -no-feature-textmarkdownreader

        cmake --build . --parallel

        sudo cmake --install .

    - name: Package Qt SDK
      run: |
        cd /opt

        sudo tar -czf $HOME/qt6-sdk.tar.gz qt6

    - name: Upload Qt SDK
      uses: actions/upload-artifact@v4
      with:
        name: qt6-sdk
        path: ~/qt6-sdk.tar.gz



  #
  # Build Application Matrix
  #
  app-build:
    needs: qt-build

    runs-on: ubuntu-latest

    strategy:
      matrix:
        build_type:
          - Debug
          - Release

    steps:
    - uses: actions/checkout@v4

    - name: Install Runtime Dependencies
      run: |
        sudo apt update

        sudo apt install -y \
          ninja-build \
          build-essential \
          cmake \
          zip \
          patchelf \
          libwayland-dev \
          libxkbcommon-dev \
          libegl1-mesa-dev \
          libgl1-mesa-dev

    - name: Download Qt SDK
      uses: actions/download-artifact@v4
      with:
        name: qt6-sdk
        path: ~

    - name: Extract Qt SDK
      run: |
        cd /

        sudo tar -xzf ~/qt6-sdk.tar.gz

    - name: Configure Application
      run: |
        cmake -B build-${{ matrix.build_type }} \
          -cmake-generator Ninja
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_PREFIX_PATH=/opt/qt6

    - name: Build Application
      run: |
        cmake --build build-${{ matrix.build_type }} --parallel

    - name: Create Portable Bundle
      run: |
        mkdir -p artifact/bin
        mkdir -p artifact/lib
        mkdir -p artifact/plugins/platforms
        mkdir -p artifact/plugins/wayland-decoration-client
        mkdir -p artifact/plugins/wayland-graphics-integration-client

        #
        # Copy executable
        #
        cp build-${{ matrix.build_type }}/hawkwm artifact/bin/

        #
        # Copy Qt libraries
        #
        cp /opt/qt6/lib/libQt6*.so* artifact/lib/ || true

        #
        # Copy Wayland platform plugins
        #
        cp /opt/qt6/plugins/platforms/libqwayland* \
          artifact/plugins/platforms/ || true

        #
        # Copy decoration plugins
        #
        cp /opt/qt6/plugins/wayland-decoration-client/* \
          artifact/plugins/wayland-decoration-client/ || true

        #
        # Copy graphics integration plugins
        #
        cp /opt/qt6/plugins/wayland-graphics-integration-client/* \
          artifact/plugins/wayland-graphics-integration-client/ || true

        #
        # Launcher script
        #
        cat > artifact/run.sh << 'EOF'
        #!/bin/bash

        DIR="$(cd "$(dirname "$0")" && pwd)"

        export LD_LIBRARY_PATH="$DIR/lib:$LD_LIBRARY_PATH"
        export QT_PLUGIN_PATH="$DIR/plugins"

        "$DIR/bin/hawkwm"
        EOF

        chmod +x artifact/run.sh

        #
        # Create zip
        #
        zip -r hawkwm-${{ matrix.build_type }}.zip artifact

    - name: Upload Application Artifact
      uses: actions/upload-artifact@v4
      with:
        name: hawkwm-${{ matrix.build_type }}
        path: hawkwm-${{ matrix.build_type }}.zip
